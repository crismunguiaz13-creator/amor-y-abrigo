<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Página no encontrada — Amor y Abrigo Honduras</title>
<link rel="icon" type="image/png" href="https://www.amoryabrigohn.org/images/Logo.png">
<link rel="stylesheet" href="styles.css">
<style>
.not-found {
  min-height: 100vh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 2rem;
  background: var(--light);
}
.not-found img {
  width: 100px; height: 100px; object-fit: contain;
  margin-bottom: 1.5rem;
  animation: float 3s ease-in-out infinite;
}
@keyframes float {
  0%,100% { transform: translateY(0); }
  50%      { transform: translateY(-12px); }
}
.not-found h1 {
  font-family: 'Fraunces', serif;
  font-size: clamp(3rem, 8vw, 6rem);
  font-weight: 900; color: var(--blue);
  line-height: 1; margin-bottom: .5rem;
}
.not-found h2 {
  font-family: 'Fraunces', serif;
  font-size: 1.5rem; font-weight: 700;
  color: var(--dark); margin-bottom: 1rem;
}
.not-found p {
  color: var(--gray); font-size: 1rem;
  max-width: 400px; line-height: 1.7;
  margin-bottom: 2rem;
}
.not-found-btns {
  display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
}
</style>
</head>
<body>
<div class="not-found">
  <img src="https://www.amoryabrigohn.org/images/Logo.png" alt="Amor y Abrigo" onerror="this.style.display='none'">
  <h1>404</h1>
  <h2>¡Ups! Esta página se perdió como un animalito 🐾</h2>
  <p>La página que buscas no existe o fue movida. Pero tenemos muchos animalitos esperando un hogar — ¡no te vayas!</p>
  <div class="not-found-btns">
    <a href="index.html" class="btn-primary">🏠 Volver al inicio</a>
    <a href="animales.html" class="btn-secondary">🐾 Ver animales</a>
  </div>
</div>
</body>
</html>
